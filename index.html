<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cognitive AI — Knowledge Graph Explorer</title>
  <meta name="description" content="Voice-Driven Cognitive AI System with Knowledge Graph and Multi-Vector DB Orchestration" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />
</head>
<style>
  #login-overlay {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: linear-gradient(135deg, rgba(15,15,20,0.95), rgba(25,25,35,0.98));
    backdrop-filter: blur(20px); z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .login-card {
    background: rgba(40, 40, 50, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 40px; border-radius: 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    text-align: center; color: white; width: 320px;
  }
  .login-card h2 { margin: 0 0 10px 0; font-size: 24px; font-weight: 600; }
  .login-card p { margin: 0 0 24px 0; color: #a0a0b0; font-size: 14px; }
  .login-input {
    width: 100%; padding: 12px 16px; margin-bottom: 20px;
    background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; color: white; font-size: 16px; outline: none;
    box-sizing: border-box; transition: border-color 0.2s;
  }
  .login-input:focus { border-color: #6366f1; }
  .login-btn {
    width: 100%; padding: 14px; background: #6366f1;
    color: white; border: none; border-radius: 12px;
    font-size: 16px; font-weight: 600; cursor: pointer;
    transition: background 0.2s;
  }
  .login-btn:hover { background: #4f46e5; }
  #login-error { color: #ef4444; font-size: 14px; margin-top: 16px; display: none; }
</style>
<body>
  <div id="login-overlay">
    <div class="login-card">
      <div style="font-size: 48px; margin-bottom: 16px;">🧠</div>
      <h2>Cognitive AI</h2>
      <p>Enter your access key to unlock the brain.</p>
      <input type="password" id="login-password" class="login-input" placeholder="Password" />
      <button id="login-submit" class="login-btn">Unlock</button>
      <div id="login-error">Incorrect password</div>
    </div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
